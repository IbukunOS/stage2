name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Preflight SSH Reachability
        env:
          TARGET_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set +e

          HOST="$(printf '%s' "$TARGET_HOST" | tr -d '[:space:]')"
          if [ -z "$HOST" ]; then
            echo "WARNING: EC2_HOST secret is empty or malformed. Continuing to ssh-action for definitive error output."
            exit 0
          fi

          # Test TCP connectivity to SSH port before invoking ssh-action.
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/$HOST/22" 2>/dev/null; then
            echo "WARNING: Preflight could not confirm reachability to :22 from this runner."
            echo "Proceeding to ssh-action; if it fails, check EC2_HOST formatting, security group/NACL/UFW, and potential fail2ban blocks."
            exit 0
          fi

          echo "SSH port is reachable on $HOST:22"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 90s
          command_timeout: 15m
          debug: true
          script: |
            set -e

            # Create project directory if it doesn't exist
            mkdir -p ~/remote-hustle-stage2
            cd ~/remote-hustle-stage2

            # If git repo doesn't exist, clone it. Otherwise, pull.
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Ensure backup directory exists on host
            mkdir -p backups

            # Install compose plugin if missing.
            if ! docker compose version >/dev/null 2>&1; then
              sudo -n apt-get update
              sudo -n apt-get install -y docker-compose-plugin
            fi

            # Fallback to sudo docker if user lacks docker socket access.
            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo -n docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
            else
              echo "ERROR: Docker daemon is not accessible for this user."
              exit 1
            fi

            # Clear stale containers before recreate to avoid legacy metadata issues.
            $DOCKER compose down --remove-orphans || true

            # Rebuild and recreate services.
            $DOCKER compose up -d --build --force-recreate
            $DOCKER compose ps
