name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Preflight SSH Reachability (Staging)
        env:
          TARGET_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          set +e

          HOST="$(printf '%s' "$TARGET_HOST" | tr -d '[:space:]')"
          if [ -z "$HOST" ]; then
            echo "WARNING: STAGING_HOST secret is empty or malformed. Continuing to ssh-action for definitive error output."
            exit 0
          fi

          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/$HOST/22" 2>/dev/null; then
            echo "WARNING: Preflight could not confirm reachability to :22 from this runner."
            echo "Proceeding to ssh-action; if it fails, check STAGING_HOST formatting, security group/NACL/UFW, and potential fail2ban blocks."
            exit 0
          fi

          echo "SSH port is reachable on $HOST:22"

      - name: Deploy via SSH (Staging)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 90s
          command_timeout: 15m
          debug: true
          script: |
            set -e

            mkdir -p ~/remote-hustle-staging
            cd ~/remote-hustle-staging

            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin staging
              git reset --hard origin/staging
            fi

            if ! docker compose version >/dev/null 2>&1; then
              sudo -n apt-get update
              sudo -n apt-get install -y docker-compose-plugin
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER="docker"
            elif sudo -n docker info >/dev/null 2>&1; then
              DOCKER="sudo docker"
            else
              echo "ERROR: Docker daemon is not accessible for this user."
              exit 1
            fi

            $DOCKER compose -p remotehustle_staging down --remove-orphans || true
            $DOCKER compose -p remotehustle_staging up -d --build --force-recreate
            $DOCKER compose -p remotehustle_staging ps
